<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cut and Project Quasicrystal Simulation</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="simCanvas"></canvas>

    <script>
        /**
         * 1. State Variables & Parameters
         */
        const SimulationState = {
            theta: Math.PI / 4, // Angle of the 1D physical space line (radians)
            windowWidth: 1.0,   // Width of the acceptance band (W)
            gridLimit: 20,      // Evaluates grid from -gridLimit to +gridLimit
            
            gridPoints: [],     // All evaluated 2D points with their projection values
            selectedPoints: [], // Points that fall within the cut window
            projected1D: []     // The final sorted 1D sequence in physical space
        };

        /**
         * 2. Data Structures
         */
        class LatticePoint {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.p_parallel = 0;      // Coordinate in 1D physical space
                this.p_perpendicular = 0; // Coordinate in 1D perpendicular/internal space
                this.selected = false;    // True if point falls within the cut window
            }
        }

        /**
         * 3. Math Engine
         */
        const MathEngine = {
            updateSimulation() {
                // Clear previous state outputs
                SimulationState.gridPoints = [];
                SimulationState.selectedPoints = [];
                SimulationState.projected1D = [];

                // Pre-compute trigonometric values
                const cosTheta = Math.cos(SimulationState.theta);
                const sinTheta = Math.sin(SimulationState.theta);
                const halfWindow = SimulationState.windowWidth / 2;
                const limit = SimulationState.gridLimit;

                // Iterate over the 2D Cartesian grid
                for (let x = -limit; x <= limit; x++) {
                    for (let y = -limit; y <= limit; y++) {
                        const pt = new LatticePoint(x, y);

                        // Calculate orthogonal projections
                        pt.p_parallel = x * cosTheta + y * sinTheta;
                        pt.p_perpendicular = -x * sinTheta + y * cosTheta;

                        // The Cut
                        if (Math.abs(pt.p_perpendicular) <= halfWindow) {
                            pt.selected = true;
                            SimulationState.selectedPoints.push(pt);
                            SimulationState.projected1D.push(pt.p_parallel);
                        }

                        SimulationState.gridPoints.push(pt);
                    }
                }

                // Sort the projected 1D points spatially
                SimulationState.projected1D.sort((a, b) => a - b);
            },

            setTheta(newThetaRadians) {
                SimulationState.theta = newThetaRadians;
                this.updateSimulation();
            },

            setWindowWidth(newWidth) {
                SimulationState.windowWidth = newWidth;
                this.updateSimulation();
            },

            setGridLimit(newLimit) {
                SimulationState.gridLimit = Math.floor(newLimit);
                this.updateSimulation();
            }
        };

        /**
         * 4. Rendering Engine
         */
        const RenderConfig = {
            scale: 40, // Base pixels per grid unit
        };

        function setupCanvas() {
            const canvas = document.getElementById('simCanvas');
            const ctx = canvas.getContext('2d');
            
            // Adjust to device pixel ratio for sharp rendering
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            
            // CSS size
            canvas.style.width = `${window.innerWidth}px`;
            canvas.style.height = `${window.innerHeight}px`;
            
            // Normalize scale for high DPI
            ctx.scale(dpr, dpr);
            
            return { canvas, ctx };
        }

        function drawSimulation() {
            const { canvas, ctx } = setupCanvas();
            // Use CSS logical size for layout math
            const width = window.innerWidth;
            const height = window.innerHeight;
            
            const originX = width / 2;
            const originY = height / 2;
            const scale = RenderConfig.scale;

            // Clear canvas
            ctx.clearRect(0, 0, width, height);

            ctx.save();
            // Translate origin to center
            ctx.translate(originX, originY);
            // Invert Y axis so +y goes up, matching standard Cartesian coordinates
            ctx.scale(1, -1); 

            const limit = SimulationState.gridLimit;

            // 1. Draw 2D background grid (light grey)
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let x = -limit; x <= limit; x++) {
                ctx.moveTo(x * scale, -limit * scale);
                ctx.lineTo(x * scale, limit * scale);
            }
            for (let y = -limit; y <= limit; y++) {
                ctx.moveTo(-limit * scale, y * scale);
                ctx.lineTo(limit * scale, y * scale);
            }
            ctx.stroke();

            // Pre-compute rendering constants
            const cosTheta = Math.cos(SimulationState.theta);
            const sinTheta = Math.sin(SimulationState.theta);
            const lineLength = Math.max(width, height) * 2; // Arbitrary long length to span screen

            // 3. Draw Selection Window / Band boundaries
            const halfW = SimulationState.windowWidth / 2;
            // Shift vector is along the perpendicular space (-sinTheta, cosTheta)
            const dx = -sinTheta * halfW * scale;
            const dy = cosTheta * halfW * scale;

            // Fill band (semi-transparent highlight)
            ctx.fillStyle = 'rgba(33, 150, 243, 0.06)';
            ctx.beginPath();
            ctx.moveTo(-lineLength * cosTheta + dx, -lineLength * sinTheta + dy);
            ctx.lineTo(lineLength * cosTheta + dx, lineLength * sinTheta + dy);
            ctx.lineTo(lineLength * cosTheta - dx, lineLength * sinTheta - dy);
            ctx.lineTo(-lineLength * cosTheta - dx, -lineLength * sinTheta - dy);
            ctx.closePath();
            ctx.fill();

            // Draw band boundary lines
            ctx.strokeStyle = 'rgba(33, 150, 243, 0.2)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(-lineLength * cosTheta + dx, -lineLength * sinTheta + dy);
            ctx.lineTo(lineLength * cosTheta + dx, lineLength * sinTheta + dy);
            ctx.moveTo(-lineLength * cosTheta - dx, -lineLength * sinTheta - dy);
            ctx.lineTo(lineLength * cosTheta - dx, lineLength * sinTheta - dy);
            ctx.stroke();

            // Draw unselected lattice points as subtle grey dots
            ctx.fillStyle = '#d4d4d4';
            SimulationState.gridPoints.forEach(pt => {
                if (!pt.selected) {
                    ctx.beginPath();
                    ctx.arc(pt.x * scale, pt.y * scale, 3, 0, 2 * Math.PI);
                    ctx.fill();
                }
            });

            // 2. Draw 1D physical space line (blue, passing through the origin)
            ctx.strokeStyle = '#2196F3';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-lineLength * cosTheta, -lineLength * sinTheta);
            ctx.lineTo(lineLength * cosTheta, lineLength * sinTheta);
            ctx.stroke();

            // 4 & 5. Draw projection lines and highlighted selected points
            SimulationState.selectedPoints.forEach(pt => {
                const px = pt.x * scale;
                const py = pt.y * scale;
                
                // Calculate position of the projected point on the physical space line
                const projX = pt.p_parallel * cosTheta * scale;
                const projY = pt.p_parallel * sinTheta * scale;

                // 5. Projection lines dropping from selected points
                ctx.strokeStyle = 'rgba(244, 67, 54, 0.4)';
                ctx.setLineDash([4, 4]); // Dashed line
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(px, py);
                ctx.lineTo(projX, projY);
                ctx.stroke();
                ctx.setLineDash([]); // Reset dash for subsequent drawing

                // 4. Highlight the selected integer lattice points (red dots)
                ctx.fillStyle = '#F44336';
                ctx.beginPath();
                ctx.arc(px, py, 5, 0, 2 * Math.PI);
                ctx.fill();

                // 6. Draw the final projected points on the physical space line (solid blue dots)
                ctx.fillStyle = '#1565C0';
                ctx.beginPath();
                ctx.arc(projX, projY, 5, 0, 2 * Math.PI);
                ctx.fill();
            });

            ctx.restore();
        }

        /**
         * 5. Initialization
         */
        function init() {
            // Hardcode test values as requested: 30 degrees and 1.5 window width
            MathEngine.setTheta(30 * Math.PI / 180);
            MathEngine.setWindowWidth(1.5);
            
            // Re-render on window resize to maintain full screen and center alignment
            window.addEventListener('resize', drawSimulation);
            
            // Trigger initial render
            drawSimulation();
        }

        // Boot the simulation
        init();

    </script>
</body>
</html>
