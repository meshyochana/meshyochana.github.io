<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Interactive Coordinate & Image FT Editor</title>
<style>
  :root {
    --primary-color: #007bff;
    --primary-hover: #0056b3;
    --light-gray: #f0f2f5;
    --medium-gray: #dee2e6;
    --dark-gray: #495057;
    --text-color: #212529;
    --card-bg: #ffffff;
    --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: var(--light-gray);
    color: var(--text-color);
    line-height: 1.6;
  }

  .container { max-width: 1700px; margin: 0 auto; padding: 2rem; }
  header { text-align: center; margin-bottom: 2rem; }
  h1 { font-size: 2.5rem; color: var(--dark-gray); }
  h2 { text-align: center; margin-bottom: 1.5rem; font-size: 1.5rem; color: var(--dark-gray); border-bottom: 1px solid var(--medium-gray); padding-bottom: 0.5rem; }

  .controls {
    margin-bottom: 2rem;
    padding: 1.5rem;
    background-color: var(--card-bg);
    border-radius: 12px;
    box-shadow: var(--shadow);
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: flex-start;
    gap: 1.5rem;
  }

  .control-group { display: flex; align-items: center; gap: 0.75em; }
  .control-group-col { display: flex; flex-direction: column; gap: 0.5em; }
  .control-group-row-center { display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 0.5em; }

  button, input[type="file"]::file-selector-button {
    padding: 10px 18px;
    font-size: 1rem;
    border: none;
    border-radius: 8px;
    background-color: var(--primary-color);
    color: white;
    cursor: pointer;
    transition: background-color 0.2s ease;
  }

  button:hover, input[type="file"]::file-selector-button:hover { background-color: var(--primary-hover); }

  input[type="checkbox"], input[type="radio"] { width: 1.25em; height: 1.25em; accent-color: var(--primary-color); cursor: pointer; }
  input[type="number"] { width: 80px; padding: 4px; }
  input[type="range"] { width: 120px; }
  label { cursor: pointer; white-space: nowrap; font-weight: 500; }
  
  #ft-window-shape { display: flex; gap: 1em; }
  #ft-window-shape label { display: flex; align-items: center; gap: 0.25em; }

  .plots-wrapper { display: flex; flex-direction: row; flex-wrap: wrap; gap: 2rem; justify-content: center; }
  .plot-container { flex: 1; min-width: 800px; max-width: 800px; background: var(--card-bg); border-radius: 12px; box-shadow: var(--shadow); padding: 1.5rem; }
  canvas { width: 100%; height: auto; border: 1px solid var(--medium-gray); cursor: default; touch-action: none; }
  #fft-canvas { background-color: #000; border-color: #fff; }

  /* ── Mobile: fit entire app in the viewport height ── */
  @media (max-width: 900px) {
    html, body {
      height: 100dvh;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .container {
      flex: 1;
      min-height: 0;          /* allow shrinking */
      display: flex;
      flex-direction: column;
      padding: 6px 8px;
      overflow: hidden;
    }

    header { display: none; }  /* hide big title to save space */

    main {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow: hidden;
    }

    .controls {
      flex-shrink: 0;
      padding: 6px 10px;
      gap: 8px;
      margin-bottom: 0;
      border-radius: 8px;
    }

    .plots-wrapper {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow: hidden;
    }

    .plot-container {
      flex: 1;
      min-width: 0;
      max-width: 100%;
      padding: 4px 6px;
      border-radius: 8px;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Title row: compact */
    h2 {
      font-size: 0.8rem;
      margin-bottom: 3px;
      padding-bottom: 2px;
      flex-shrink: 0;
    }

    /* Canvas wrapper fills remaining space in its plot-container */
    .plot-container > canvas,
    .plot-container > div {
      flex: 1;
      min-height: 0;
    }

    /* Make canvases fill their container height */
    canvas {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    button { padding: 8px 14px; font-size: 0.9rem; }
    label { font-size: 0.85rem; }
    input[type="checkbox"], input[type="radio"] { width: 1.3em; height: 1.3em; }
  }
</style>

</head>
<body>

  <div class="container">
    <header><h1>Interactive Coordinate & Image FT Editor</h1></header>
    
    <main>
        <div class="controls">
            <div class="control-group-col" style="border: 1px solid var(--medium-gray); padding: 10px; border-radius: 8px; background: #f8f9fa;">
                <label style="color: var(--primary-color);"><strong>K-Space Plot Mode</strong></label>
                <div class="control-group">
                    <label><input type="radio" id="mode-abs" name="plot-mode" value="abs" checked> Abs Mode (Magnitude)</label>
                </div>
                <div class="control-group">
                    <label><input type="radio" id="mode-phase" name="plot-mode" value="phase"> Phase Mode (Complex)</label>
                </div>
            </div>

            <div class="control-group-col">
                 <div style="display: flex; flex-direction: column; gap: 6px;">
                     <div class="control-group">
                         <input type="checkbox" id="kzoom-mode-checkbox">
                         <label for="kzoom-mode-checkbox">Zoom K-Space</label>
                     </div>
                     <button id="reset-kzoom-btn" disabled style="padding: 6px 12px; font-size: 0.9rem;">Reset Zoom</button>
                     <div id="kzoom-info" style="font-size: 0.78rem; color: #888; min-height: 1.2em;"></div>
                 </div>
            </div>
        </div>

        <div class="plots-wrapper">
            <div class="plot-container">
                <h2 id="spatial-title">Real Space</h2>
                <canvas id="scatter-plot" width="800" height="800"></canvas>
            </div>
            <div class="plot-container">
                <h2 id="kspace-title">K-Space (Fourier Transform)</h2>
                <div style="display: flex; flex-direction: row; align-items: stretch; gap: 0;">
                    <!-- Spacer on the left to keep canvas centered, balancing the legend on the right -->
                    <div style="flex-shrink: 0; width: 54px;"></div>
                    <div style="position: relative; flex: 1; min-width: 0; line-height: 0;">
                        <canvas id="fft-canvas" width="800" height="800"></canvas>
                        <canvas id="fft-overlay" width="800" height="800" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;"></canvas>
                    </div>
                    <div id="phase-legend" style="flex-shrink: 0; width: 54px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; background: #111; padding: 6px 4px; border-left: 1px solid #333; visibility: hidden;">
                        <div style="width: 32px; height: 32px; border-radius: 50%; background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red); border: 1px solid #555; flex-shrink: 0;"></div>
                        <div style="writing-mode: vertical-rl; text-orientation: mixed; transform: rotate(180deg); font-size: 0.6rem; color: #ccc; line-height: 1.3; text-align: center;">
                            <strong style="color:#fff;">Hue</strong> = Phase <i>arg(ρ)</i><br>
                            <strong style="color:#fff;">Bright</strong> = Amp <i>|ρ|</i><br>
                            <span style="font-size:0.55rem; color:#aaa;">0°=R · 90°=G · ±180°=C · -90°=B</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
  </div>

  <script>
    const scatterCanvas = document.getElementById('scatter-plot');
    const sCtx = scatterCanvas.getContext('2d');
    const fftCanvas = document.getElementById('fft-canvas');
    const fCtx = fftCanvas.getContext('2d');
    const margin = 50;

    const modeAbsRadio = document.getElementById('mode-abs');
    const modePhaseRadio = document.getElementById('mode-phase');
    const phaseLegend = document.getElementById('phase-legend');

    // Fixed settings
    const K_MAX = 2;
    const RESOLUTION = 180;

    let points = [];
    let loadedImage = null;
    let isImageMode = false;
    let isDraggingWindow = false;
    let isResizingWindow = false;
    let resizeHandle = '';
    let isDraggingPoint = false;
    let draggedPoint = null;
    
    let fftWindow = { x: 375, y: 375, width: 150, height: 150 }; 
    let interactionOffset = {x: 0, y: 0};
    
    let windowCenter = {x: 0, y: 0};
    let scale = 1, minX = 0, maxX = 0, minY = 0, maxY = 0;

    // K-space zoom state
    let kCenterX = 0, kCenterY = 0;
    let kOriginalMax = null;
    let isKZoomMode = false;
    let kZoomDrag = { active: false, startX: 0, startY: 0, curX: 0, curY: 0 };

    function getViridisColor(t) {
        t = Math.max(0, Math.min(1, t));
        const colors = [[68,1,84],[72,35,116],[64,67,135],[52,94,141],[41,120,142],[32,144,140],[34,167,132],[68,190,112],[121,209,81],[189,223,38],[253,231,37]];
        const i = Math.floor(t * (colors.length - 1));
        const j = Math.min(i + 1, colors.length - 1);
        const f = t * (colors.length - 1) - i;
        return [
            Math.round(colors[i][0] + f * (colors[j][0] - colors[i][0])),
            Math.round(colors[i][1] + f * (colors[j][1] - colors[i][1])),
            Math.round(colors[i][2] + f * (colors[j][2] - colors[i][2]))
        ];
    }

    function hsvToRgb(h, s, v) {
        let r, g, b;
        let i = Math.floor(h * 6);
        let f = h * 6 - i;
        let p = v * (1 - s);
        let q = v * (1 - f * s);
        let t = v * (1 - (1 - f) * s);
        switch (i % 6) {
            case 0: r = v, g = t, b = p; break;
            case 1: r = q, g = v, b = p; break;
            case 2: r = p, g = v, b = t; break;
            case 3: r = p, g = q, b = v; break;
            case 4: r = t, g = p, b = v; break;
            case 5: r = v, g = p, b = q; break;
        }
        return [Math.round(r * 255), Math.round(g * 255), Math.round(b * 255)];
    }

    function getFftMouse(e) {
        const r = fftCanvas.getBoundingClientRect();
        return {
            x: (e.clientX - r.left) * (800 / r.width),
            y: (e.clientY - r.top) * (800 / r.height)
        };
    }

    function canvasToKSpace(cx, cy) {
        const k_max = K_MAX;
        return {
            kx: kCenterX + (cx / 800 - 0.5) * 2 * k_max,
            ky: kCenterY + (cy / 800 - 0.5) * 2 * k_max
        };
    }

    function drawKZoomOverlay() {
        const oCtx = document.getElementById('fft-overlay').getContext('2d');
        oCtx.clearRect(0, 0, 800, 800);
        if (!kZoomDrag.active) return;
        const x = Math.min(kZoomDrag.startX, kZoomDrag.curX);
        const y = Math.min(kZoomDrag.startY, kZoomDrag.curY);
        const w = Math.abs(kZoomDrag.curX - kZoomDrag.startX);
        const h = Math.abs(kZoomDrag.curY - kZoomDrag.startY);
        oCtx.strokeStyle = 'rgba(255, 220, 0, 0.95)';
        oCtx.lineWidth = 2;
        oCtx.setLineDash([5, 3]);
        oCtx.strokeRect(x, y, w, h);
        oCtx.fillStyle = 'rgba(255, 220, 0, 0.08)';
        oCtx.fillRect(x, y, w, h);
    }

    let currentKMax = K_MAX;

    function applyKZoom() {
        const dx = Math.abs(kZoomDrag.curX - kZoomDrag.startX);
        const dy = Math.abs(kZoomDrag.curY - kZoomDrag.startY);
        if (dx < 10 || dy < 10) return;

        const k_max = currentKMax;
        if (kOriginalMax === null) kOriginalMax = k_max;

        const cx = (kZoomDrag.startX + kZoomDrag.curX) / 2;
        const cy = (kZoomDrag.startY + kZoomDrag.curY) / 2;
        const { kx, ky } = canvasToKSpace(cx, cy);
        const newKMax = Math.max(dx, dy) / 800 * k_max;

        kCenterX = kx;
        kCenterY = ky;
        currentKMax = newKMax;

        document.getElementById('reset-kzoom-btn').disabled = false;
        document.getElementById('kzoom-info').textContent =
            `Center: (${kCenterX.toFixed(3)}, ${kCenterY.toFixed(3)})`;
        calculateAndDisplayFT();
    }

    function drawFFTWindow() {
        if (!isImageMode && points.length === 0) return;
        sCtx.save();
        sCtx.fillStyle = 'rgba(0, 100, 255, 0.15)';
        sCtx.strokeStyle = 'rgba(0, 100, 255, 0.6)';
        sCtx.lineWidth = 2;
        const handleSize = 10;

        sCtx.fillRect(fftWindow.x, fftWindow.y, fftWindow.width, fftWindow.height);
        sCtx.strokeRect(fftWindow.x, fftWindow.y, fftWindow.width, fftWindow.height);
        sCtx.fillStyle = '#007bff';
        [[0,0],[1,0],[0,1],[1,1]].forEach(([ox,oy]) => {
            sCtx.fillRect(fftWindow.x + ox*fftWindow.width - handleSize/2, fftWindow.y + oy*fftWindow.height - handleSize/2, handleSize, handleSize);
        });
        sCtx.restore();
    }

    function calculateTransforms() {
        if (isImageMode) {
            minX = 0; maxX = 800; minY = 0; maxY = 800; scale = 1;
        } else if (points.length > 0) {
            minX = Math.min(...points.map(p => p.x)); maxX = Math.max(...points.map(p => p.x));
            minY = Math.min(...points.map(p => p.y)); maxY = Math.max(...points.map(p => p.y));
            const dW = maxX - minX || 1; const dH = maxY - minY || 1;
            scale = Math.min(700/dW, 700/dH);
        }
        if (windowCenter.x === 0) { windowCenter.x = (maxX+minX)/2; windowCenter.y = (maxY+minY)/2; }
    }

    function calculateAndDisplayFT() {
        const res = RESOLUTION;
        const k_max = currentKMax;
        const isPhaseMode = modePhaseRadio.checked;
        let ftPts = [];

        if (isImageMode) {
            const tempC = document.createElement('canvas');
            tempC.width = res; tempC.height = res;
            const tCtx = tempC.getContext('2d');
            tCtx.drawImage(scatterCanvas, fftWindow.x, fftWindow.y, fftWindow.width, fftWindow.height, 0, 0, res, res);
            const pD = tCtx.getImageData(0, 0, res, res).data;
            for(let y=0; y<res; y++){
                for(let x=0; x<res; x++){
                    const idx = (y*res + x)*4;
                    const w = (pD[idx] + pD[idx+1] + pD[idx+2])/3;
                    if(w > 5) ftPts.push({x: x-res/2, y: res/2-y, w: w/255});
                }
            }
        } else {
            let pts = points;
            let cx = (maxX+minX)/2, cy = (maxY+minY)/2;
            const wX1 = (fftWindow.x-margin)/scale+minX; const wX2 = wX1 + fftWindow.width/scale;
            const wY2 = ((800-margin)-fftWindow.y)/scale+minY; const wY1 = wY2 - fftWindow.height/scale;
            pts = points.filter(p => p.x >= wX1 && p.x <= wX2 && p.y >= wY1 && p.y <= wY2);
            cx = (wX1+wX2)/2; cy = (wY1+wY2)/2;
            ftPts = pts.map(p => ({x: p.x-cx, y: p.y-cy, w: 1}));
        }

        if(ftPts.length === 0) { fCtx.clearRect(0,0,800,800); return; }

        const mags = new Float32Array(res * res);
        let phases = null;
        if (isPhaseMode) phases = new Float32Array(res * res);

        for(let py=0; py<res; py++){
            for(let px=0; px<res; px++){
                const kx = kCenterX + (px-res/2)*(2*k_max/res); const ky = kCenterY + (py-res/2)*(2*k_max/res);
                let re = 0, im = 0;
                for(const p of ftPts){
                    const dot = p.x*kx + p.y*ky;
                    re += p.w * Math.cos(-dot); im += p.w * Math.sin(-dot);
                }
                const idx = py*res + px;
                mags[idx] = Math.log(1 + Math.sqrt(re*re + im*im));
                if (isPhaseMode) phases[idx] = Math.atan2(im, re);
            }
        }

        // Always apply noise reduction
        const avg = mags.reduce((a,b)=>a+b)/mags.length;
        const thr = Math.max(...mags) * 0.1;
        for(let i=0; i<mags.length; i++) mags[i] = mags[i] < thr ? 0 : Math.max(0, mags[i]-avg);

        let maxM = 0;
        for(let i=0; i<mags.length; i++){
            if(mags[i] > maxM) maxM = mags[i];
        }

        const out = fCtx.createImageData(res, res);
        for(let i=0; i<mags.length; i++){
            if (isPhaseMode) {
                let v = mags[i] / (maxM || 1); 
                let h = phases[i] / (2 * Math.PI);
                if (h < 0) h += 1.0; 
                const [r, g, b] = hsvToRgb(h, 1.0, v);
                out.data.set([r, g, b, 255], i*4);
            } else {
                const col = getViridisColor(mags[i]/(maxM||1));
                out.data.set([...col, 255], i*4);
            }
        }
        
        const tC = document.createElement('canvas'); tC.width = tC.height = res;
        tC.getContext('2d').putImageData(out, 0, 0);
        fCtx.clearRect(0,0,800,800); fCtx.imageSmoothingEnabled = false;
        fCtx.drawImage(tC, 0, 0, 800, 800);
    }

    function drawSpatial() {
        sCtx.clearRect(0,0,800,800);
        if(isImageMode && loadedImage) sCtx.drawImage(loadedImage, 0, 0, 800, 800);
        else {
            sCtx.fillStyle = '#007bff';
            points.forEach(p => {
                const cx = margin + (p.x-minX)*scale; const cy = 800-margin-(p.y-minY)*scale;
                sCtx.beginPath(); sCtx.arc(cx, cy, 2, 0, 7); sCtx.fill();
            });
        }
        drawFFTWindow();
    }

    function updateAll() { 
        calculateTransforms(); 
        drawSpatial(); 
        calculateAndDisplayFT(); 
        phaseLegend.style.visibility = modePhaseRadio.checked ? 'visible' : 'hidden';
    }

    // --- Interaction Logic ---
    function getCanvasPos(canvas, clientX, clientY) {
        const r = canvas.getBoundingClientRect();
        const x = (clientX - r.left) * (800 / r.width);
        const y = (clientY - r.top) * (800 / r.height);
        return { x, y, dx: (x-margin)/scale+minX, dy: ((800-margin)-y)/scale+minY };
    }

    function getMouse(e) { return getCanvasPos(scatterCanvas, e.clientX, e.clientY); }

    // Larger hit-area for touch
    function getHandleSize() { return window.matchMedia('(pointer: coarse)').matches ? 30 : 12; }

    function handleStart(m) {
        const hs = getHandleSize();
        if(Math.abs(m.x - fftWindow.x) < hs && Math.abs(m.y - fftWindow.y) < hs) { isResizingWindow = true; resizeHandle = 'nw'; return true; }
        if(Math.abs(m.x - (fftWindow.x+fftWindow.width)) < hs && Math.abs(m.y - fftWindow.y) < hs) { isResizingWindow = true; resizeHandle = 'ne'; return true; }
        if(Math.abs(m.x - fftWindow.x) < hs && Math.abs(m.y - (fftWindow.y+fftWindow.height)) < hs) { isResizingWindow = true; resizeHandle = 'sw'; return true; }
        if(Math.abs(m.x - (fftWindow.x+fftWindow.width)) < hs && Math.abs(m.y - (fftWindow.y+fftWindow.height)) < hs) { isResizingWindow = true; resizeHandle = 'se'; return true; }
        const isInside = (m.x > fftWindow.x && m.x < fftWindow.x+fftWindow.width && m.y > fftWindow.y && m.y < fftWindow.y+fftWindow.height);
        if(isInside) { isDraggingWindow = true; interactionOffset = {x: m.x-fftWindow.x, y: m.y-fftWindow.y}; return true; }
        return false;
    }

    function handleMove(m) {
        if (isResizingWindow) {
            const oldR = fftWindow.x + fftWindow.width; const oldB = fftWindow.y + fftWindow.height;
            if(resizeHandle.includes('n')) { fftWindow.height = oldB - m.y; fftWindow.y = m.y; }
            if(resizeHandle.includes('s')) { fftWindow.height = m.y - fftWindow.y; }
            if(resizeHandle.includes('w')) { fftWindow.width = oldR - m.x; fftWindow.x = m.x; }
            if(resizeHandle.includes('e')) { fftWindow.width = m.x - fftWindow.x; }
            fftWindow.width = Math.max(10, fftWindow.width); fftWindow.height = Math.max(10, fftWindow.height);
        } else if (isDraggingWindow) {
            fftWindow.x = m.x - interactionOffset.x; fftWindow.y = m.y - interactionOffset.y;
            windowCenter.x = (fftWindow.x + fftWindow.width/2 - margin)/scale + minX;
            windowCenter.y = ((800 - margin) - (fftWindow.y + fftWindow.height/2))/scale + minY;
        } else if (isDraggingPoint) {
            draggedPoint.x = m.dx; draggedPoint.y = m.dy;
        }
        if(isResizingWindow || isDraggingWindow || isDraggingPoint) updateAll();
    }

    function handleEnd() {
        isResizingWindow = isDraggingWindow = isDraggingPoint = false;
    }

    // --- Mouse events ---
    scatterCanvas.addEventListener('mousedown', e => {
        const m = getMouse(e);
        handleStart(m);
    });

    fftCanvas.addEventListener('mousedown', e => {
        if (!isKZoomMode) return;
        const m = getFftMouse(e);
        kZoomDrag = { active: true, startX: m.x, startY: m.y, curX: m.x, curY: m.y };
    });

    window.addEventListener('mousemove', e => {
        if (kZoomDrag.active) {
            const m = getFftMouse(e);
            kZoomDrag.curX = m.x; kZoomDrag.curY = m.y;
            drawKZoomOverlay();
        }
        const m = getMouse(e);
        if (!isResizingWindow && !isDraggingWindow) {
            scatterCanvas.style.cursor = 'default';
            const hs = getHandleSize();
            if((Math.abs(m.x-fftWindow.x)<hs || Math.abs(m.x-(fftWindow.x+fftWindow.width))<hs) && (Math.abs(m.y-fftWindow.y)<hs || Math.abs(m.y-(fftWindow.y+fftWindow.height))<hs))
                scatterCanvas.style.cursor = 'nwse-resize';
        }
        handleMove(m);
    });

    window.addEventListener('mouseup', () => {
        handleEnd();
        if (kZoomDrag.active) {
            kZoomDrag.active = false;
            document.getElementById('fft-overlay').getContext('2d').clearRect(0, 0, 800, 800);
            applyKZoom();
        }
    });

    // --- Touch events ---
    let pinchStartDist = null;
    let pinchStartW = 0, pinchStartH = 0;

    function getTouchPos(touch) {
        return getCanvasPos(scatterCanvas, touch.clientX, touch.clientY);
    }

    scatterCanvas.addEventListener('touchstart', e => {
        e.preventDefault();
        if (e.touches.length === 1) {
            const m = getTouchPos(e.touches[0]);
            handleStart(m);
        } else if (e.touches.length === 2) {
            // Two fingers: start pinch-to-resize
            handleEnd();
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            pinchStartDist = Math.hypot(dx, dy);
            pinchStartW = fftWindow.width;
            pinchStartH = fftWindow.height;
        }
    }, { passive: false });

    scatterCanvas.addEventListener('touchmove', e => {
        e.preventDefault();
        if (e.touches.length === 1 && pinchStartDist === null) {
            const m = getTouchPos(e.touches[0]);
            handleMove(m);
        } else if (e.touches.length === 2) {
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            const dist = Math.hypot(dx, dy);
            if (pinchStartDist !== null) {
                const ratio = dist / pinchStartDist;
                const cx = fftWindow.x + fftWindow.width / 2;
                const cy = fftWindow.y + fftWindow.height / 2;
                fftWindow.width = Math.max(10, pinchStartW * ratio);
                fftWindow.height = Math.max(10, pinchStartH * ratio);
                fftWindow.x = cx - fftWindow.width / 2;
                fftWindow.y = cy - fftWindow.height / 2;
                updateAll();
            }
        }
    }, { passive: false });

    scatterCanvas.addEventListener('touchend', e => {
        e.preventDefault();
        if (e.touches.length < 2) pinchStartDist = null;
        if (e.touches.length === 0) handleEnd();
    }, { passive: false });

    // --- Touch zoom on fftCanvas ---
    function getFftTouch(touch) {
        const r = fftCanvas.getBoundingClientRect();
        return {
            x: (touch.clientX - r.left) * (800 / r.width),
            y: (touch.clientY - r.top) * (800 / r.height)
        };
    }

    fftCanvas.addEventListener('touchstart', e => {
        if (!isKZoomMode) return;
        e.preventDefault();
        if (e.touches.length === 1) {
            const m = getFftTouch(e.touches[0]);
            kZoomDrag = { active: true, startX: m.x, startY: m.y, curX: m.x, curY: m.y };
        }
    }, { passive: false });

    fftCanvas.addEventListener('touchmove', e => {
        if (!isKZoomMode || !kZoomDrag.active) return;
        e.preventDefault();
        if (e.touches.length === 1) {
            const m = getFftTouch(e.touches[0]);
            kZoomDrag.curX = m.x; kZoomDrag.curY = m.y;
            drawKZoomOverlay();
        }
    }, { passive: false });

    fftCanvas.addEventListener('touchend', e => {
        if (!isKZoomMode || !kZoomDrag.active) return;
        e.preventDefault();
        kZoomDrag.active = false;
        document.getElementById('fft-overlay').getContext('2d').clearRect(0, 0, 800, 800);
        applyKZoom();
    }, { passive: false });

    // --- Listeners ---
    // Mode toggles
    modeAbsRadio.addEventListener('change', updateAll);
    modePhaseRadio.addEventListener('change', updateAll);

    document.getElementById('kzoom-mode-checkbox').addEventListener('change', function () {
        isKZoomMode = this.checked;
        fftCanvas.style.cursor = isKZoomMode ? 'crosshair' : 'default';
        document.getElementById('kspace-title').textContent =
            isKZoomMode ? 'K-Space — drag to zoom' : 'K-Space (Fourier Transform)';
    });

    document.getElementById('reset-kzoom-btn').addEventListener('click', () => {
        kCenterX = 0; kCenterY = 0;
        currentKMax = kOriginalMax !== null ? kOriginalMax : K_MAX;
        kOriginalMax = null;
        document.getElementById('reset-kzoom-btn').disabled = true;
        document.getElementById('kzoom-info').textContent = '';
        calculateAndDisplayFT();
    });

    // Load default dataset
    fetch('dislocations_area_batio3_points.txt')
        .then(r => r.text())
        .then(text => {
            points = text.split('\n').filter(l => l.trim()).map(l => {
                const [x,y] = l.split(/[\s,]+/).map(Number); return {x,y};
            }).filter(p => !isNaN(p.x));
            isImageMode = false;
            updateAll();
        });
  </script>
</body>
</html>
